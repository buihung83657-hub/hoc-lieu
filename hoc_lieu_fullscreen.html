
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hệ thống học liệu tương tác</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;width:100%;}
.app{width:100%;min-height:100vh;background:#f0f4f8;overflow:hidden;}
.hdr{background:#1565C0;color:#fff;padding:16px 24px;}
.hdr h2{font-size:12px;opacity:.75;margin-bottom:3px;}
.hdr h1{font-size:18px;font-weight:500;}
.back-btn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;margin-bottom:8px;font-family:var(--font-sans);padding:5px 12px;border-radius:20px;}
.screen{display:none;}.screen.active{display:block;}
.pad{padding:16px;max-width:860px;margin:0 auto;}

/* NÚT ĐEN CHỮ TRẮNG — hiện sẵn */
.blk-btn{background:#1a1a1a;color:#fff;border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font-sans);display:inline-flex;align-items:center;gap:6px;}
.blk-btn.full{width:100%;justify-content:center;margin-top:8px;}
/* NÚT XANH LÁ */
.green-btn{background:#27500A;color:#fff;border:none;border-radius:8px;padding:11px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font-sans);width:100%;justify-content:center;display:flex;align-items:center;gap:6px;margin-top:8px;}
/* NÚT XANH DƯƠNG — làm bài, hiện sẵn */
.play-btn{background:#1565C0;color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font-sans);display:inline-flex;align-items:center;gap:4px;}
/* NÚT ĐEN NHỎ — sửa, hiện sẵn */
.sm-btn{background:#1a1a1a;color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font-sans);display:inline-flex;align-items:center;gap:4px;}
/* NÚT THÊM ĐÁP ÁN */
.outline-btn{background:none;border:1.5px solid #1a1a1a;color:#1a1a1a;border-radius:6px;padding:5px 11px;font-size:12px;cursor:pointer;font-family:var(--font-sans);display:inline-flex;align-items:center;gap:4px;}
.outline-btn:hover{background:#1a1a1a;color:#fff;}

.card{background:#fff;border-radius:10px;border:0.5px solid #ddd;padding:14px;margin-bottom:10px;}

/* CARD-TITLE — chữ đen đậm nổi bật */
.card-title{font-size:15px;font-weight:500;color:#111;margin-bottom:10px;display:flex;align-items:center;gap:6px;}

.lbl{font-size:11px;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px;}

/* INPUT — nền đen chữ trắng, hiện sẵn */
input[type=text]{width:100%;border:none;border-radius:7px;padding:10px 12px;font-size:13px;font-family:var(--font-sans);color:#e8e8e8;background:#1a1a1a;margin-bottom:8px;outline:none;}
input[type=text]::placeholder{color:#666;}
input[type=text]:focus{background:#222;outline:2px solid #378ADD;outline-offset:1px;}

/* TEXTAREA — nền đen chữ trắng, hiện sẵn */
textarea{width:100%;border:none;border-radius:7px;padding:10px 12px;font-size:13px;font-family:var(--font-sans);color:#e8e8e8;background:#1a1a1a;margin-bottom:8px;outline:none;resize:vertical;min-height:64px;}
textarea::placeholder{color:#666;}
textarea:focus{background:#222;outline:2px solid #378ADD;outline-offset:1px;}

.mon-card{background:#fff;border-radius:10px;border:0.5px solid #ddd;padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.mon-card:hover{border-color:#1565C0;}
.mon-ic{width:36px;height:36px;border-radius:8px;background:#1565C0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;}
.mon-name{font-size:13px;font-weight:500;color:#111;}
.mon-sub{font-size:11px;color:#888;margin-top:1px;}

.bai-item{background:#fff;border-radius:8px;border:0.5px solid #ddd;padding:11px 14px;display:flex;align-items:center;gap:10px;margin-bottom:7px;}
.bai-num{width:26px;height:26px;border-radius:50%;background:#1565C0;color:#fff;font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
/* Tên bài — chữ đen đậm */
.bai-name{font-size:13px;font-weight:500;color:#111;flex:1;}

.q-editor-block{background:#fff;border-radius:10px;border:0.5px solid #ddd;padding:14px;margin-bottom:10px;}
.q-editor-title{font-size:13px;font-weight:500;color:#111;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.opt-row{display:flex;gap:7px;align-items:center;margin-bottom:7px;}
.opt-row input{margin-bottom:0;flex:1;}

/* DẤU TÍCH ✓ — xanh lá rõ, hiện sẵn khi chưa bấm */
.chk-toggle{width:30px;height:30px;border-radius:6px;border:2px solid #1D9E75;background:#fff;cursor:pointer;font-size:15px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#1D9E75;}
.chk-toggle.on{background:#1D9E75;color:#fff;}

/* DẤU X — đỏ rõ, hiện sẵn */
.del-opt-btn{width:30px;height:30px;border-radius:6px;border:2px solid #E24B4A;background:#fff;cursor:pointer;font-size:14px;color:#E24B4A;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.del-opt-btn:hover{background:#E24B4A;color:#fff;}

/* NÚT XÓA CÂU HỎI */
.del-q-btn{background:none;border:none;color:#E24B4A;cursor:pointer;font-size:17px;padding:0;line-height:1;}

.q-block{background:#fff;border-radius:10px;border:0.5px solid #ddd;padding:14px;margin-bottom:10px;}
.q-num-badge{font-size:11px;background:#1565C0;color:#fff;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:8px;}
.q-text{font-size:14px;font-weight:500;color:#111;margin-bottom:4px;line-height:1.5;}
.multi-badge{font-size:11px;background:#FAEEDA;color:#633806;padding:3px 10px;border-radius:6px;margin-bottom:10px;display:inline-block;}
.opt{padding:10px 13px;border-radius:8px;border:1px solid #ddd;font-size:13px;color:#111;margin-bottom:7px;cursor:pointer;display:flex;align-items:center;gap:9px;}
.opt:last-child{margin-bottom:0;}
.opt:hover{border-color:#1565C0;}
.opt.selected{border-color:#1565C0;background:#E6F1FB;color:#0C447C;}
.opt.correct-ans{background:#E1F5EE;border-color:#1D9E75;color:#085041;}
.opt.wrong-ans{background:#FCEBEB;border-color:#E24B4A;color:#791F1F;}
.chkbox{width:17px;height:17px;border-radius:4px;border:1.5px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;}
.opt.selected .chkbox{border-color:#1565C0;background:#1565C0;color:#fff;}
.opt.correct-ans .chkbox{border-color:#1D9E75;background:#1D9E75;color:#fff;}
.opt.wrong-ans .chkbox{border-color:#E24B4A;background:#E24B4A;color:#fff;}

.result-summary{background:#1565C0;border-radius:10px;padding:18px;margin-bottom:12px;text-align:center;}
.score-big{font-size:34px;font-weight:500;color:#fff;}
.score-lbl{font-size:13px;color:rgba(255,255,255,.75);margin-top:2px;}
.tag-ok{font-size:11px;background:#E1F5EE;color:#085041;padding:2px 8px;border-radius:8px;}
.tag-err{font-size:11px;background:#FCEBEB;color:#791F1F;padding:2px 8px;border-radius:8px;}
.hint-line{font-size:12px;color:#0F6E56;margin-top:8px;padding-top:8px;border-top:0.5px solid #eee;}
.empty{font-size:13px;color:#aaa;text-align:center;padding:20px 0;}
</style>

<h2 class="sr-only">Hệ thống học liệu tương tác</h2>
<div class="app">

<div id="s-home" class="screen active">
  <div class="hdr"><h2>Hệ thống học liệu</h2><h1>Trang chủ</h1></div>
  <div class="pad">
    <div class="card">
      <div class="card-title"><i class="ti ti-school" aria-hidden="true"></i> Tạo môn học</div>
      <div class="lbl">Tên môn học</div>
      <input type="text" id="inp-mon" placeholder="VD: Hệ điều hành Linux" />
      <button class="blk-btn full" onclick="addMon()"><i class="ti ti-plus" aria-hidden="true"></i> Thêm môn học</button>
    </div>
    <div id="mon-list"></div>
  </div>
</div>

<div id="s-bai" class="screen">
  <div class="hdr">
    <button class="back-btn" onclick="goTo('s-home')"><i class="ti ti-arrow-left"></i> Danh sách môn</button>
    <h1 id="bai-hdr"></h1>
  </div>
  <div class="pad">
    <div class="card">
      <div class="card-title"><i class="ti ti-file-plus" aria-hidden="true"></i> Tạo bài học</div>
      <div class="lbl">Tên bài học</div>
      <input type="text" id="inp-bai" placeholder="VD: Bài 1: Phân vùng ổ đĩa" />
      <button class="blk-btn full" onclick="addBai()"><i class="ti ti-plus" aria-hidden="true"></i> Thêm bài học</button>
    </div>
    <div id="bai-list"></div>
  </div>
</div>

<div id="s-edit" class="screen">
  <div class="hdr">
    <button class="back-btn" onclick="goTo('s-bai')"><i class="ti ti-arrow-left"></i> Danh sách bài</button>
    <h1 id="edit-hdr"></h1>
  </div>
  <div class="pad">
    <div id="q-editor"></div>
    <button class="blk-btn full" onclick="addQ()" style="margin-bottom:8px;"><i class="ti ti-plus" aria-hidden="true"></i> Thêm câu hỏi</button>
    <button class="green-btn" onclick="saveBai()"><i class="ti ti-device-floppy" aria-hidden="true"></i> Lưu bài học</button>
  </div>
</div>

<div id="s-quiz" class="screen">
  <div class="hdr">
    <button class="back-btn" onclick="goTo('s-bai')"><i class="ti ti-arrow-left"></i> Thoát bài</button>
    <h1 id="quiz-hdr"></h1>
  </div>
  <div class="pad">
    <div id="quiz-body"></div>
    <button class="green-btn" onclick="submitQuiz()"><i class="ti ti-send" aria-hidden="true"></i> Nộp bài</button>
  </div>
</div>

<div id="s-result" class="screen">
  <div class="hdr">
    <button class="back-btn" onclick="goTo('s-bai')"><i class="ti ti-arrow-left"></i> Về danh sách bài</button>
    <h1>Kết quả bài làm</h1>
  </div>
  <div class="pad">
    <div class="result-summary">
      <div class="score-big" id="res-score">0/0</div>
      <div class="score-lbl">câu đúng</div>
    </div>
    <div id="res-body"></div>
    <button class="blk-btn full" style="margin-top:4px;" onclick="goTo('s-bai')"><i class="ti ti-arrow-left" aria-hidden="true"></i> Về danh sách bài</button>
  </div>
</div>

</div>

<script>
var D={mons:[],curMon:-1,curBai:-1,ans:{}};
function goTo(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});document.getElementById(id).classList.add('active');}
function addMon(){var v=document.getElementById('inp-mon').value.trim();if(!v)return;D.mons.push({name:v,bais:[]});document.getElementById('inp-mon').value='';renderMons();}
function renderMons(){var el=document.getElementById('mon-list');if(!D.mons.length){el.innerHTML='<p class="empty">Chưa có môn học nào. Hãy tạo môn học đầu tiên!</p>';return;}el.innerHTML=D.mons.map(function(m,i){return '<div class="mon-card" onclick="openMon('+i+')"><div class="mon-ic"><i class="ti ti-book" aria-hidden="true"></i></div><div style="flex:1"><div class="mon-name">'+m.name+'</div><div class="mon-sub">'+m.bais.length+' bài học</div></div><i class="ti ti-chevron-right" style="color:#bbb;font-size:16px;" aria-hidden="true"></i></div>';}).join('');}
function openMon(i){D.curMon=i;document.getElementById('bai-hdr').textContent=D.mons[i].name;renderBais();goTo('s-bai');}
function addBai(){var v=document.getElementById('inp-bai').value.trim();if(!v||D.curMon<0)return;D.mons[D.curMon].bais.push({name:v,qs:[]});document.getElementById('inp-bai').value='';renderBais();}
function renderBais(){var m=D.mons[D.curMon];var el=document.getElementById('bai-list');if(!m.bais.length){el.innerHTML='<p class="empty">Chưa có bài học nào.</p>';return;}el.innerHTML=m.bais.map(function(b,i){return '<div class="bai-item"><div class="bai-num">'+(i+1)+'</div><div class="bai-name">'+b.name+'</div><button class="sm-btn" style="margin-right:6px;" onclick="openEdit('+i+')"><i class="ti ti-edit" aria-hidden="true"></i> Sửa</button><button class="play-btn" onclick="openQuiz('+i+')"><i class="ti ti-player-play" aria-hidden="true"></i> Làm bài</button></div>';}).join('');}
function openEdit(bi){D.curBai=bi;var b=D.mons[D.curMon].bais[bi];document.getElementById('edit-hdr').textContent='Soạn câu hỏi: '+b.name;renderEditor();goTo('s-edit');}
function saveBai(){goTo('s-bai');}
function renderEditor(){var b=D.mons[D.curMon].bais[D.curBai];var el=document.getElementById('q-editor');if(!b.qs.length){el.innerHTML='<p class="empty" style="margin-bottom:10px;">Chưa có câu hỏi nào. Bấm "Thêm câu hỏi" để bắt đầu.</p>';return;}el.innerHTML=b.qs.map(function(q,qi){return '<div class="q-editor-block"><div class="q-editor-title"><span>Câu hỏi '+(qi+1)+'</span><button class="del-q-btn" onclick="delQ('+qi+')" aria-label="Xóa câu hỏi"><i class="ti ti-trash"></i></button></div><div class="lbl">Nội dung câu hỏi</div><textarea placeholder="Nhập câu hỏi..." onchange="D.mons[D.curMon].bais[D.curBai].qs['+qi+'].text=this.value">'+q.text+'</textarea><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;"><input type="checkbox" id="multi-'+qi+'"'+(q.multi?' checked':'')+' onchange="toggleMulti('+qi+',this.checked)" style="width:auto;margin:0;accent-color:#1a1a1a;"/><label for="multi-'+qi+'" style="font-size:12px;color:#555;cursor:pointer;">Cho phép chọn nhiều đáp án đúng</label></div><div class="lbl">Các đáp án <span style="color:#1D9E75;">(bấm ✓ để đánh dấu đúng)</span></div>'+q.opts.map(function(o,oi){var isC=q.multi?(q.corrects&&q.corrects.indexOf(oi)>=0):(q.correct===oi);return '<div class="opt-row"><input type="text" value="'+o+'" placeholder="Nhập đáp án '+(oi+1)+'..." onchange="updateOpt('+qi+','+oi+',this.value)"/><button class="chk-toggle'+(isC?' on':'')+'" onclick="setCorrect('+qi+','+oi+')" aria-label="Đánh dấu đúng">✓</button><button class="del-opt-btn" onclick="delOpt('+qi+','+oi+')" aria-label="Xóa đáp án"><i class="ti ti-x"></i></button></div>';}).join('')+'<button class="outline-btn" style="margin-top:4px;" onclick="addOpt('+qi+')"><i class="ti ti-plus" aria-hidden="true"></i> Thêm đáp án</button></div>';}).join('');}
function addQ(){D.mons[D.curMon].bais[D.curBai].qs.push({text:'',opts:['',''],correct:0,corrects:[0],multi:false});renderEditor();}
function delQ(qi){D.mons[D.curMon].bais[D.curBai].qs.splice(qi,1);renderEditor();}
function addOpt(qi){D.mons[D.curMon].bais[D.curBai].qs[qi].opts.push('');renderEditor();}
function delOpt(qi,oi){var q=D.mons[D.curMon].bais[D.curBai].qs[qi];if(q.opts.length<=2)return;q.opts.splice(oi,1);if(q.correct>=q.opts.length)q.correct=0;q.corrects=(q.corrects||[]).filter(function(c){return c<q.opts.length;});renderEditor();}
function updateOpt(qi,oi,val){D.mons[D.curMon].bais[D.curBai].qs[qi].opts[oi]=val;}
function toggleMulti(qi,val){D.mons[D.curMon].bais[D.curBai].qs[qi].multi=val;renderEditor();}
function setCorrect(qi,oi){var q=D.mons[D.curMon].bais[D.curBai].qs[qi];if(q.multi){q.corrects=q.corrects||[];var idx=q.corrects.indexOf(oi);if(idx>=0)q.corrects.splice(idx,1);else q.corrects.push(oi);}else{q.correct=oi;}renderEditor();}
function openQuiz(bi){D.curBai=bi;D.ans={};var b=D.mons[D.curMon].bais[bi];document.getElementById('quiz-hdr').textContent=b.name;renderQuiz();goTo('s-quiz');}
function renderQuiz(){var b=D.mons[D.curMon].bais[D.curBai];var el=document.getElementById('quiz-body');if(!b.qs.length){el.innerHTML='<p class="empty">Bài này chưa có câu hỏi nào.</p>';return;}el.innerHTML=b.qs.map(function(q,qi){var sel=D.ans[qi]||[];var hint=q.multi?'<span class="multi-badge"><i class="ti ti-info-circle" aria-hidden="true"></i> Chọn '+((q.corrects||[]).length)+' đáp án đúng nhất</span><br/>':'';return '<div class="q-block"><span class="q-num-badge">Câu '+(qi+1)+'</span><div class="q-text">'+q.text+'</div>'+hint+q.opts.map(function(o,oi){var isSel=sel.indexOf(oi)>=0;return '<div class="opt'+(isSel?' selected':'')+'" onclick="selectAns('+qi+','+oi+','+!!q.multi+')"><div class="chkbox">'+(isSel?'✓':'')+'</div><span>'+o+'</span></div>';}).join('')+'</div>';}).join('');}
function selectAns(qi,oi,multi){if(!D.ans[qi])D.ans[qi]=[];var arr=D.ans[qi];var idx=arr.indexOf(oi);if(multi){if(idx>=0)arr.splice(idx,1);else arr.push(oi);}else{D.ans[qi]=[oi];}renderQuiz();}
function submitQuiz(){var b=D.mons[D.curMon].bais[D.curBai];if(!b.qs.length){goTo('s-bai');return;}var correct=0;b.qs.forEach(function(q,qi){var ua=D.ans[qi]||[];if(q.multi){var cs=(q.corrects||[]).slice().sort().join(',');var us=ua.slice().sort().join(',');if(cs===us)correct++;}else{if(ua[0]===q.correct)correct++;}});document.getElementById('res-score').textContent=correct+'/'+b.qs.length;var el=document.getElementById('res-body');el.innerHTML=b.qs.map(function(q,qi){var ua=D.ans[qi]||[];var isOk;if(q.multi){var cs=(q.corrects||[]).slice().sort().join(',');var us=ua.slice().sort().join(',');isOk=(cs===us);}else{isOk=(ua[0]===q.correct);}var correctSet=q.multi?(q.corrects||[]):[q.correct];return '<div class="q-block"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;"><span class="q-num-badge">Câu '+(qi+1)+'</span><span class="'+(isOk?'tag-ok':'tag-err')+'">'+(isOk?'✓ Đúng':'✗ Sai')+'</span></div><div class="q-text">'+q.text+'</div>'+q.opts.map(function(o,oi){var isCorrectOpt=correctSet.indexOf(oi)>=0;var isUserSel=ua.indexOf(oi)>=0;var cls='opt';var icon='';if(isCorrectOpt){cls+=' correct-ans';icon='✓';}else if(isUserSel&&!isCorrectOpt){cls+=' wrong-ans';icon='✗';}return '<div class="'+cls+'"><div class="chkbox">'+icon+'</div><span>'+o+'</span></div>';}).join('')+(isOk?'':'<div class="hint-line"><i class="ti ti-arrow-right" aria-hidden="true"></i> Đáp án đúng được đánh dấu màu xanh bên trên</div>')+'</div>';}).join('');goTo('s-result');}
renderMons();
</script>
</div>
</body>
</html>
